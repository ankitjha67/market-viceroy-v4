# Default configuration for yield_curve_regime_allocation.
#
# Estrella-Hardouvelis (1991) / Ang-Piazzesi-Wei (2006) yield-curve-
# slope 3-cell regime allocation. Two raw yield-level informational
# columns (DGS10, DGS2) drive an internally-computed 2s10s slope
# (the slope goes negative on inversion so it cannot itself be a
# bridge-passed column — see docs/phase-2-amendments.md). Third
# strategy in the Session 2G regime-state group.

strategy: yield_curve_regime_allocation
family: macro
paper_doi: "10.1016/j.jfineco.2005.05.005"

universe:
  # Tradable ETFs (carry regime-conditional weights)
  - "SPY"     # US large-cap equity (steep-curve / pro-cyclical)
  - "TLT"     # 20+ year Treasuries (inverted-curve / defensive)
  - "GLD"     # Physical gold (defensive inflation hedge)
  # Informational FRED yield series (carry weight = 0.0, strictly positive)
  - "DGS10"   # 10-year Treasury constant-maturity yield (%)
  - "DGS2"    # 2-year Treasury yield (%) — DGS2 over DGS3MO for ZIRP positivity

# 3-cell regime thresholds (on the DGS10 - DGS2 slope, %)
steep_threshold: 1.0    # slope >= 1.0% (100 bps) → steep
flat_threshold: 0.0     # 0.0 <= slope < 1.0% → flat; slope < 0.0 → inverted

# Publication-lag shift (yields are daily; 1mo for parity with the group)
yield_lag_months: 1

# 3-cell regime allocations (SPY, TLT, GLD)
regime_weights:
  steep:    [0.70, 0.30, 0.00]   # strong-growth forecast → equity-heavy
  flat:     [0.40, 0.40, 0.20]   # neutral → balanced
  inverted: [0.00, 0.60, 0.40]   # recession warning → defensive

# Portfolio mechanics
long_only: true
rebalance: monthly

meta:
  paper_doi: "10.1016/j.jfineco.2005.05.005"
  paper_url: "https://doi.org/10.1016/j.jfineco.2005.05.005"
  foundational_paper_doi: "10.1111/j.1540-6261.1991.tb03775.x"
  foundational_paper_url: "https://doi.org/10.1111/j.1540-6261.1991.tb03775.x"
  long_yield_url: "https://fred.stlouisfed.org/series/DGS10"
  short_yield_url: "https://fred.stlouisfed.org/series/DGS2"
  last_validated_against_data_through: "2025-12-31"

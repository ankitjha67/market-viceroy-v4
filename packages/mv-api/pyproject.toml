[project]
name = "mv-api"
version = "0.0.1"
description = "FastAPI backend and WebSocket streams; Operator-authed mutating endpoints."
readme = "README.md"
license = { text = "Apache-2.0" }
requires-python = ">=3.12"
authors = [{ name = "Ankit Jha" }]
dependencies = [
    "pydantic>=2.7",
    "fastapi>=0.110",
    "uvicorn>=0.30",
    "pandas>=2.2",
    "polars>=1.0",
    "alphakit-bench",
    "alphakit-bridges",
    "mv-agents",
    "mv-failover",
    "mv-journal",
    "mv-postmortem",
    "mv-risk",
    "nautilus_trader==1.228.0",
]

[project.scripts]
mv-paper = "mv.api.cli:paper_main"
mv-kill = "mv.api.cli:kill_main"
mv-serve = "mv.api.cli:serve_main"

[build-system]
requires = ["hatchling>=1.25"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["mv"]
exclude = ["**/tests/**"]

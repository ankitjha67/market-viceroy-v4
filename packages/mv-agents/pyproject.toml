[project]
name = "mv-agents"
version = "0.0.1"
description = "LangGraph agent graph, agent I/O schemas, bull/bear debate, and the Buy/Sell/Hold portfolio-manager decision."
readme = "README.md"
license = { text = "Apache-2.0" }
requires-python = ">=3.12"
authors = [{ name = "Ankit Jha" }]
dependencies = [
    "pydantic>=2.7",
]

[build-system]
requires = ["hatchling>=1.25"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["mv"]
exclude = ["**/tests/**"]

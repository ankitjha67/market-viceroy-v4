[project]
name = "alphakit-bridges"
version = "0.0.1"
description = "AlphaKit engine bridges: vectorbt, backtrader, LEAN, nautilus."
readme = "README.md"
license = { text = "Apache-2.0" }
requires-python = ">=3.10"
authors = [{ name = "Ankit Jha" }]
dependencies = [
    "alphakit-core",
    "numpy>=1.26",
    "pandas>=2.2",
    "vectorbt>=0.26",
    "backtrader>=1.9",
]

[project.optional-dependencies]
lean = []  # LEAN is a Phase 2+ integration — no pip-installable package
nautilus = ["nautilus_trader>=1.193"]

[build-system]
requires = ["hatchling>=1.25"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["alphakit"]

[project]
name = "alphakit-core"
version = "0.0.1"
description = "AlphaKit core: protocols, data schemas, instruments, portfolio, metrics."
readme = "README.md"
license = { text = "Apache-2.0" }
requires-python = ">=3.10"
authors = [{ name = "Ankit Jha" }]
dependencies = [
    "numpy>=1.26",
    "pandas>=2.2",
    "pydantic>=2.7",
    "pandas-market-calendars>=4.4",
]

[build-system]
requires = ["hatchling>=1.25"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["alphakit"]

# Default configuration for commodity_tsmom.
#
# Cross-commodity 12/1 time-series momentum on a multi-instrument
# panel of continuous-contract futures. Mirrors Asness §V's commodity
# sub-strategy (Table III) on a tractable 8-commodity default that
# spans energy, metals, and grains.

strategy: commodity_tsmom
family: commodity
paper_doi: "10.1111/jofi.12021"

universe:
  - "CL=F"   # Crude oil (WTI)
  - "NG=F"   # Natural gas (Henry Hub)
  - "GC=F"   # Gold
  - "SI=F"   # Silver
  - "HG=F"   # Copper
  - "ZC=F"   # Corn
  - "ZS=F"   # Soybeans
  - "ZW=F"   # Wheat

# Signal parameters (unchanged from Asness §V)
lookback_months: 12
skip_months: 1

# Position-sizing parameters
vol_target_annual: 0.10
vol_lookback_days: 63            # ~3 months of trading days
annualization: 252
max_leverage_per_asset: 3.0      # safety cap when realised vol → 0

# Portfolio mechanics
long_only: false
rebalance: monthly

meta:
  paper_doi: "10.1111/jofi.12021"
  paper_url: "https://doi.org/10.1111/jofi.12021"
  foundational_paper_doi: "10.1016/j.jfineco.2011.11.003"
  foundational_paper_url: "https://doi.org/10.1016/j.jfineco.2011.11.003"
  last_validated_against_data_through: "2025-12-31"

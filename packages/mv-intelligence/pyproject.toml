[project]
name = "mv-intelligence"
version = "0.0.1"
description = "Point-in-time intelligence: feature store (as-of joins, leakage check), fundamentals, sentiment, indicators, FRED no-train guardrail, forecasting (GBM + optional FinBERT/LSTM), MLflow tracking."
readme = "README.md"
license = { text = "Apache-2.0" }
requires-python = ">=3.12"
authors = [{ name = "Ankit Jha" }]
dependencies = [
    "pydantic>=2.7",
    "pandas>=2.2",
    "numpy>=1.26",
    "requests>=2.31",
    "clickhouse-connect>=0.7",
    "alphakit-bridges",
    "scikit-learn>=1.4",
    "mlflow>=2.12",
]

# Deep forecasters (FinBERT / LSTM) are an optional, offline extra — torch is
# heavy and non-deterministic, so it stays OUT of the per-push CI gate. The
# GBM forecaster (sklearn) is the deterministic CI default + fallback.
[project.optional-dependencies]
forecasting-deep = [
    "torch>=2.2",
    "transformers>=4.40",
]

[build-system]
requires = ["hatchling>=1.25"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["mv"]
exclude = ["**/tests/**"]

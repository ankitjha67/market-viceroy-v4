[project]
name = "mv-intelligence"
version = "0.0.1"
description = "Point-in-time intelligence features: fundamentals, valuation, technicals, NLP/sentiment, forecasting (as-of joins; no look-ahead)."
readme = "README.md"
license = { text = "Apache-2.0" }
requires-python = ">=3.12"
authors = [{ name = "Ankit Jha" }]
dependencies = [
    "pydantic>=2.7",
    "pandas>=2.2",
    "numpy>=1.26",
    "requests>=2.31",
    "clickhouse-connect>=0.7",
]

[build-system]
requires = ["hatchling>=1.25"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["mv"]
exclude = ["**/tests/**"]

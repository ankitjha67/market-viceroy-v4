[project]
name = "mv-failover"
version = "0.0.1"
description = "Data-plane failover governor (Phase 1). Ships the Phase-0 CCXT->ClickHouse smoke."
readme = "README.md"
license = { text = "Apache-2.0" }
requires-python = ">=3.12"
authors = [{ name = "Ankit Jha" }]
dependencies = [
    "pydantic>=2.7",
    "pydantic-settings>=2.2",
    "polars>=1.0",
    "ccxt>=4.0",
    "clickhouse-connect>=0.7",
]

[project.scripts]
mv-smoke = "mv.failover.smoke.cli:main"

[build-system]
requires = ["hatchling>=1.25"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["mv"]
exclude = ["**/tests/**"]

# Default configuration for bxmp_overlay.
#
# CBOE BXMP-aligned monthly call+put overlay (reframed wheel
# strategy). Each month: long underlying, short ATM call (BXM),
# short 5%-OTM put with cash collateral (PUT-aligned).
#
# Whaley 2002 foundational + Israelov-Nielsen 2014 primary +
# CBOE BXMP methodology. See docs/phase-2-amendments.md
# 2026-05-01 'reframe wheel_strategy → bxmp_overlay' for the
# wheel-to-BXMP reframe rationale.

strategy: bxmp_overlay
family: options
paper_doi: "10.2469/faj.v70.n6.5"

universe:
  - "SPY"

underlying_symbol: "SPY"
call_otm_pct: 0.0     # ATM per BXM canonical
put_otm_pct: 0.05     # 5% OTM per PUT-aligned practitioner variant
rebalance: monthly

meta:
  paper_doi: "10.2469/faj.v70.n6.5"
  paper_url: "https://doi.org/10.2469/faj.v70.n6.5"
  foundational_paper_doi: "10.3905/jod.2002.319188"
  foundational_paper_url: "https://doi.org/10.3905/jod.2002.319188"
  feed: "synthetic-options + yfinance"
  data_fidelity: "Synthetic chain via Black-Scholes (ADR-005). Flat IV across strikes — no skew. Real-feed Polygon verification deferred to Phase 3."
  bridge_integration: "Composition wrapper combining CoveredCallSystematic (ATM call) + CashSecuredPutSystematic (5% OTM put). Declares discrete_legs = (call_leg_symbol, put_leg_symbol). vectorbt_bridge dispatches SizeType.Amount for both option legs and SizeType.TargetPercent for the underlying."
  reframed_from: "wheel_strategy"
  reframe_rationale: "Wheel is folklore (sequenced put/call writes based on assignment state); BXMP is academic (deterministic monthly combined writes). See docs/phase-2-amendments.md 2026-05-01."
  last_validated_against_data_through: "2025-12-31"

[project]
name = "mv-risk"
version = "0.0.1"
description = "Risk engine with inviolable kill-switch, daily-loss/drawdown breakers, and position/exposure caps. INVIOLABLE: no agent or autonomy setting may override these — only the Operator."
readme = "README.md"
license = { text = "Apache-2.0" }
requires-python = ">=3.12"
authors = [{ name = "Ankit Jha" }]
dependencies = [
    "pydantic>=2.7",
]

[build-system]
requires = ["hatchling>=1.25"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["mv"]
exclude = ["**/tests/**"]

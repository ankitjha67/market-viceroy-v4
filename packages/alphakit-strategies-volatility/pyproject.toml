[project]
name = "alphakit-strategies-volatility"
version = "0.0.1"
description = "AlphaKit volatility strategies (Phase 1 target: 10 strategies)."
readme = "README.md"
license = { text = "Apache-2.0" }
requires-python = ">=3.10"
authors = [{ name = "Ankit Jha" }]
dependencies = [
    "alphakit-core",
    "numpy>=1.26",
    "pandas>=2.2",
    "PyYAML>=6.0",
]

[build-system]
requires = ["hatchling>=1.25"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["alphakit"]
exclude = ["**/tests/**"]

# Default configuration for curve_steepener_2s10s.
#
# Two-leg DV01-neutral steepener on the US Treasury 2s10s curve.
# Enters when the log-price spread is high (= yield spread narrow vs
# history) and mean-reversion expected to widen the curve. Exits when
# the spread normalises.
#
# Default universe: SHY (1-3 Year Treasury Bond ETF) for the short
# end and TLT (20+ Year Treasury Bond ETF) for the long end. SHY's
# effective duration is closer to 1.9 than to 2.0 due to its 1-3 year
# basket; TLT's is closer to 17 than to the 10Y-only 8.0. The default
# durations below match the **constant-maturity 2Y/10Y** assumptions
# used in the FRED-only fallback path; for ETF-based real-feed runs
# the durations should be re-estimated from each ETF's actual basket.

strategy: curve_steepener_2s10s
family: rates
paper_doi: "10.1257/0002828053828581"

universe:
  - SHY  # iShares 1-3 Year Treasury Bond ETF (short-end leg)
  - TLT  # iShares 20+ Year Treasury Bond ETF (long-end leg)

# Signal parameters
zscore_window: 252           # ~1 year rolling window
entry_threshold: 1.0         # 1σ above the mean → enter
exit_threshold: 0.25         # 0.25σ above the mean → exit
long_duration: 8.0           # modified duration of the 10Y CMT
short_duration: 1.95         # modified duration of the 2Y CMT

rebalance: daily

meta:
  paper_doi: "10.1257/0002828053828581"
  paper_url: "https://doi.org/10.1257/0002828053828581"
  foundational_paper_doi: "10.3905/jfi.1991.692347"
  foundational_paper_url: "https://doi.org/10.3905/jfi.1991.692347"
  last_validated_against_data_through: "2025-12-31"

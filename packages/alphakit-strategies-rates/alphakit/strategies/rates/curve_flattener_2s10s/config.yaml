# Default configuration for curve_flattener_2s10s.
#
# Mirror image of curve_steepener_2s10s. Enters when the log-price
# spread is unusually low (long-end has under-performed → yield spread
# is wide vs history). Exits when the spread normalises.

strategy: curve_flattener_2s10s
family: rates
paper_doi: "10.1257/0002828053828581"

universe:
  - SHY  # iShares 1-3 Year Treasury Bond ETF (short-end leg)
  - TLT  # iShares 20+ Year Treasury Bond ETF (long-end leg)

zscore_window: 252
entry_threshold: 1.0
exit_threshold: 0.25
long_duration: 8.0
short_duration: 1.95

rebalance: daily

meta:
  paper_doi: "10.1257/0002828053828581"
  paper_url: "https://doi.org/10.1257/0002828053828581"
  foundational_paper_doi: "10.3905/jfi.1991.692347"
  foundational_paper_url: "https://doi.org/10.3905/jfi.1991.692347"
  last_validated_against_data_through: "2025-12-31"

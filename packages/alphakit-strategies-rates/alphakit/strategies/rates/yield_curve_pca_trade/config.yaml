# Default configuration for yield_curve_pca_trade.
#
# Rolling PCA on a multi-bond panel. After projecting the most-recent
# month's return onto the top 3 PCs, the residual is the idiosyncratic
# deviation. Cross-sectional rank of residuals → dollar-neutral
# mean-reversion weights.

strategy: yield_curve_pca_trade
family: rates
paper_doi: "10.3905/jfi.1991.692347"

universe:
  - SHY  # 1-3Y Treasury ETF
  - IEI  # 3-7Y Treasury ETF
  - IEF  # 7-10Y Treasury ETF
  - TLH  # 10-20Y Treasury ETF
  - TLT  # 20+Y Treasury ETF

n_pcs: 3
pca_window_months: 24
residual_lookback_months: 3

rebalance: monthly

meta:
  paper_doi: "10.3905/jfi.1991.692347"
  paper_url: "https://doi.org/10.3905/jfi.1991.692347"
  last_validated_against_data_through: "2025-12-31"

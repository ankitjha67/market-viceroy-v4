name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: ruff + mypy (strict) / 3.12
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.8.17"
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Set up Python 3.12
        run: uv python install 3.12
      - name: Install dependencies
        run: uv sync --extra dev
      - name: ruff check
        run: uv run ruff check .
      - name: ruff format --check
        run: uv run ruff format --check .
      - name: mypy --strict
        run: uv run mypy --strict packages/

  test:
    name: pytest + coverage gate / 3.12
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.8.17"
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Set up Python 3.12
        run: uv python install 3.12
      - name: Install dependencies
        run: uv sync --extra dev
      # The integration smoke is excluded here (MV_RUN_SMOKE unset -> skipped),
      # so this job is deterministic and network-free. The >=85% coverage gate
      # is the CLAUDE.md hard gate.
      - name: pytest with coverage gate
        run: uv run pytest --cov=alphakit --cov=mv --cov-report=term-missing --cov-fail-under=85

  smoke:
    name: data-pipe smoke (CCXT -> ClickHouse) / 3.12
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      clickhouse:
        image: clickhouse/clickhouse-server:24.8-alpine
        ports:
          - 8123:8123
          - 9000:9000
        options: >-
          --health-cmd "wget --no-verbose --tries=1 --spider http://127.0.0.1:8123/ping || exit 1"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    env:
      # Service-container defaults (throwaway creds; not real secrets).
      CLICKHOUSE_HOST: localhost
      CLICKHOUSE_HTTP_PORT: "8123"
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ""
      CLICKHOUSE_DB: marketviceroy
      # Kraken is keyless and CI-reachable; avoids exchange geo-blocking.
      SMOKE_EXCHANGE: kraken
      SMOKE_SYMBOL: BTC/USD
      SMOKE_TIMEFRAME: 1h
      SMOKE_LIMIT: "50"
      MV_RUN_SMOKE: "1"
    steps:
      - uses: actions/checkout@v5
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.8.17"
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Set up Python 3.12
        run: uv python install 3.12
      - name: Install dependencies
        run: uv sync --extra dev
      - name: Initialize ClickHouse schema
        run: |
          uv run python - <<'PY'
          import pathlib
          import clickhouse_connect
          ddl = pathlib.Path("infra/clickhouse/init/01_bars.sql").read_text()
          client = clickhouse_connect.get_client(host="localhost", port=8123, username="default", password="")
          for stmt in ddl.split(";"):
              if stmt.strip():
                  client.command(stmt)
          print("ClickHouse schema initialized")
          PY
      - name: Run the data-pipe smoke (integration round-trip)
        run: uv run pytest -m integration packages/mv-failover -v
      - name: Run the mv-smoke CLI
        run: uv run mv-smoke

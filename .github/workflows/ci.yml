name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: ruff + mypy (strict) / 3.12
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.8.17"
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Set up Python 3.12
        run: uv python install 3.12
      - name: Install dependencies
        run: uv sync --extra dev
      - name: ruff check
        run: uv run ruff check .
      - name: ruff format --check
        run: uv run ruff format --check .
      - name: mypy --strict
        run: uv run mypy --strict packages/

  test:
    name: pytest + coverage gate / 3.12
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.8.17"
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Set up Python 3.12
        run: uv python install 3.12
      - name: Install dependencies
        run: uv sync --extra dev
      # The integration smoke is excluded here (MV_RUN_SMOKE unset -> skipped),
      # so this job is deterministic and network-free. The >=85% coverage gate
      # is the CLAUDE.md hard gate.
      - name: pytest with coverage gate
        run: uv run pytest --cov=alphakit --cov=mv --cov-report=term-missing --cov-fail-under=85

  integration:
    name: integration (ClickHouse + Postgres) / 3.12
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      clickhouse:
        image: clickhouse/clickhouse-server:24.8-alpine
        # The image disables network access for 'default' when no user/password
        # env is set, so we provision an explicit user here. Throwaway creds for
        # an ephemeral service container — not real secrets.
        env:
          CLICKHOUSE_USER: mv
          CLICKHOUSE_PASSWORD: ci_clickhouse_pw
          CLICKHOUSE_DB: marketviceroy
          CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
        ports:
          - 8123:8123
          - 9000:9000
        options: >-
          --health-cmd "wget --no-verbose --tries=1 --spider http://127.0.0.1:8123/ping || exit 1"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: mv
          POSTGRES_PASSWORD: ci_postgres_pw
          POSTGRES_DB: marketviceroy
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U mv -d marketviceroy"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    env:
      # Match the service-container creds above (throwaway; not real secrets).
      CLICKHOUSE_HOST: localhost
      CLICKHOUSE_HTTP_PORT: "8123"
      CLICKHOUSE_USER: mv
      CLICKHOUSE_PASSWORD: ci_clickhouse_pw
      CLICKHOUSE_DB: marketviceroy
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"
      POSTGRES_USER: mv
      POSTGRES_PASSWORD: ci_postgres_pw
      POSTGRES_DB: marketviceroy
      # Kraken is keyless and CI-reachable; avoids exchange geo-blocking.
      SMOKE_EXCHANGE: kraken
      SMOKE_SYMBOL: BTC/USD
      SMOKE_TIMEFRAME: 1h
      SMOKE_LIMIT: "50"
      MV_RUN_SMOKE: "1"
      MV_RUN_DB: "1"
    steps:
      - uses: actions/checkout@v5
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.8.17"
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Set up Python 3.12
        run: uv python install 3.12
      - name: Install dependencies
        run: uv sync --extra dev
      - name: Apply Postgres migrations
        run: uv run mv-migrate
      - name: Initialize ClickHouse schema
        run: |
          uv run python - <<'PY'
          import os
          import pathlib
          import clickhouse_connect
          ddl = pathlib.Path("infra/clickhouse/init/01_bars.sql").read_text()
          client = clickhouse_connect.get_client(
              host=os.environ["CLICKHOUSE_HOST"],
              port=int(os.environ["CLICKHOUSE_HTTP_PORT"]),
              username=os.environ["CLICKHOUSE_USER"],
              password=os.environ["CLICKHOUSE_PASSWORD"],
              database=os.environ["CLICKHOUSE_DB"],
          )
          for stmt in ddl.split(";"):
              if stmt.strip():
                  client.command(stmt)
          print("ClickHouse schema initialized")
          PY
      - name: Journal Postgres round-trip (FR-J4)
        run: uv run pytest -m integration packages/mv-journal -v
      - name: Gate-results Postgres round-trip (FR-V3)
        run: uv run pytest -m integration packages/alphakit-bench -v
      - name: Data-pipe smoke (CCXT -> ClickHouse)
        run: uv run pytest -m integration packages/mv-failover -v
      - name: Run the mv-smoke CLI
        run: uv run mv-smoke

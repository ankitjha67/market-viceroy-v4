# Market Viceroy v4 — local development data plane.
#
# Brings up the three stateful backends the platform depends on:
#   - ClickHouse : ticks / bars / features (time-series, columnar)
#   - PostgreSQL : relational entities (instruments, decisions, journal, ...)
#   - Redis      : hot state + message bus + circuit-breaker / rate-limit state
#
# Secrets are read from a git-ignored `.env` (see `.env.example`). No
# credential is hard-coded here. Defaults are dev-only and must be
# overridden before any non-local use.
#
#   docker compose up -d
#   docker compose ps
#   docker compose down            # keep volumes
#   docker compose down -v         # also drop data
#
# The Phase-0 smoke (`uv run mv-smoke`) writes one crypto bar series into
# ClickHouse and reads it back — proving the data pipe end to end.

services:
  clickhouse:
    image: clickhouse/clickhouse-server:24.8-alpine
    container_name: mv-clickhouse
    restart: unless-stopped
    environment:
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-marketviceroy}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-mv}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:?set CLICKHOUSE_PASSWORD in .env}
      # Lets the named user run the init DDL.
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    ports:
      - "${CLICKHOUSE_HTTP_PORT:-8123}:8123"   # HTTP interface (clickhouse-connect)
      - "${CLICKHOUSE_TCP_PORT:-9000}:9000"    # native protocol
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - ./infra/clickhouse/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:8123/ping"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

  postgres:
    image: postgres:16-alpine
    container_name: mv-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-marketviceroy}
      POSTGRES_USER: ${POSTGRES_USER:-mv}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mv} -d ${POSTGRES_DB:-marketviceroy}"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s

  redis:
    image: redis:7-alpine
    container_name: mv-redis
    restart: unless-stopped
    # Password-protect even in dev; the smoke / app read it from .env.
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:?set REDIS_PASSWORD in .env}", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$REDIS_PASSWORD\" ping | grep -q PONG"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 3s

volumes:
  clickhouse-data:
  postgres-data:
  redis-data:
